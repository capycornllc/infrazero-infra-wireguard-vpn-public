name: rebuild-egress

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      INFRA_STATE_BUCKET: ${{ secrets.INFRA_STATE_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VPN_PROJECT_SLUG: ${{ secrets.VPN_PROJECT_SLUG }}
      VPN_ENVIRONMENT: ${{ secrets.VPN_ENVIRONMENT }}
      VPN_CLOUD_PROVIDER: ${{ secrets.VPN_CLOUD_PROVIDER }}
      VPN_CLOUD_REGION: ${{ secrets.VPN_CLOUD_REGION }}
      VPN_EGRESS_SERVER_TYPE: ${{ secrets.VPN_EGRESS_SERVER_TYPE }}
      VPN_ENDPOINT_MODE: ${{ secrets.VPN_ENDPOINT_MODE }}
      VPN_DOMAIN: ${{ secrets.VPN_DOMAIN }}
      VPN_ROUTING_MODE: ${{ secrets.VPN_ROUTING_MODE }}
      VPN_SPLIT_ALLOWED_IPS: ${{ secrets.VPN_SPLIT_ALLOWED_IPS }}
      VPN_CLIENT_DNS: ${{ secrets.VPN_CLIENT_DNS }}
      OPS_SSH_KEYS_JSON: ${{ secrets.OPS_SSH_KEYS_JSON }}
      DEBUG_ROOT_PASSWORD: ${{ secrets.DEBUG_ROOT_PASSWORD }}
      WG_LISTEN_PORT: ${{ secrets.WG_LISTEN_PORT }}
      WG_SERVER_ADDRESS: ${{ secrets.WG_SERVER_ADDRESS }}
      WG_SERVER_PRIVATE_KEY: ${{ secrets.WG_SERVER_PRIVATE_KEY }}
      WG_SERVER_PUBLIC_KEY: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
      VPN_PEERS_JSON: ${{ secrets.VPN_PEERS_JSON }}
      VPN_ADMIN_WG_LISTEN_PORT: ${{ secrets.VPN_ADMIN_WG_LISTEN_PORT }}
      VPN_ADMIN_WG_SERVER_ADDRESS: ${{ secrets.VPN_ADMIN_WG_SERVER_ADDRESS }}
      VPN_ADMIN_WG_SERVER_PRIVATE_KEY: ${{ secrets.VPN_ADMIN_WG_SERVER_PRIVATE_KEY }}
      VPN_ADMIN_PEERS_JSON: ${{ secrets.VPN_ADMIN_PEERS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Select cloud provider
        uses: ./.github/actions/select-provider

      - name: Export selected provider credentials
        run: |
          python scripts/common/export-selected-provider-secrets.py \
            --github-env "$GITHUB_ENV" \
            --provider-credential-script "${SCRIPTS_DIR}/ci-credentials.sh" <<'JSON'
          ${{ toJSON(secrets) }}
          JSON

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
          bash "${SCRIPTS_DIR}/ci-prepare.sh"

      - name: Normalize deploy environment
        run: |
          set -euo pipefail
          if [ -z "${VPN_PROJECT_SLUG:-}" ]; then
            echo "VPN_PROJECT_SLUG is required" >&2
            exit 1
          fi
          if [ -z "${VPN_ENVIRONMENT:-}" ]; then
            echo "VPN_ENVIRONMENT=prod" >> "$GITHUB_ENV"
          fi
          if [ -z "${VPN_CLOUD_REGION:-}" ]; then
            echo "VPN_CLOUD_REGION is required" >&2
            exit 1
          fi
          if [ -z "${S3_ENDPOINT:-}" ]; then
            echo "S3_ENDPOINT is required" >&2
            exit 1
          fi
          if [[ "${S3_ENDPOINT}" != http://* && "${S3_ENDPOINT}" != https://* ]]; then
            S3_ENDPOINT="https://${S3_ENDPOINT}"
          fi
          echo "S3_ENDPOINT=${S3_ENDPOINT}" >> "$GITHUB_ENV"

          s3_region="${PROVIDER_S3_REGION:-${S3_REGION:-${VPN_CLOUD_REGION}}}"
          if [ -z "$s3_region" ]; then
            echo "S3_REGION or VPN_CLOUD_REGION is required" >&2
            exit 1
          fi
          echo "S3_REGION=${s3_region}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${s3_region}" >> "$GITHUB_ENV"

      - name: Validate VPN config
        run: python scripts/common/validate-vpn-env.py

      - name: Render backend
        run: python scripts/common/render-backend.py --output "$TOFU_DIR/backend.hcl"

      - name: Init OpenTofu
        run: tofu -chdir="$TOFU_DIR" init -no-color -backend-config=backend.hcl

      - name: Package and upload egress bootstrap
        run: |
          set -euo pipefail
          BOOTSTRAP_DIR="$BOOTSTRAP_DIR" \
          BOOTSTRAP_PROVIDER="$BOOTSTRAP_PROVIDER" \
          BOOTSTRAP_PRESIGN_EXPIRY=3600 \
          bash scripts/common/package-bootstrap.sh --manifest build/bootstrap_artifacts.json egress-vpn

      - name: Offload WireGuard bootstrap secrets
        run: bash scripts/common/offload-vpn-bootstrap-secrets.sh build/bootstrap_secrets.json

      - name: Render OpenTofu tfvars
        run: python scripts/common/render-vpn-tfvars.py --bootstrap-manifest build/bootstrap_artifacts.json --bootstrap-secrets-manifest build/bootstrap_secrets.json --output "$TOFU_DIR/tofu.tfvars.json"

      - name: Replace VPN egress server
        run: |
          set -euo pipefail
          source "${SCRIPTS_DIR}/tofu-resources.sh"
          server="$(tofu_server_resource egress)"
          target_args=(-target="$server")
          for extra in $(tofu_replace_extra_targets egress); do
            target_args+=(-target="$extra")
          done
          bash scripts/common/tofu-retry.sh tofu -chdir="$TOFU_DIR" apply -no-color -auto-approve -parallelism=1 -var-file=tofu.tfvars.json "${target_args[@]}" -replace="$server"

      - name: Wait for server bootstrap
        run: bash "${SCRIPTS_DIR}/wait-bootstrap.sh"

      - name: Sync Cloudflare DNS
        if: env.VPN_ENDPOINT_MODE == 'domain'
        run: |
          set -euo pipefail
          egress_ip=$(tofu -chdir="$TOFU_DIR" output -no-color -raw egress_public_ipv4)
          python scripts/common/sync-cloudflare-dns.py --hostname "$VPN_DOMAIN" --ip "$egress_ip"

      - name: Validate DNS record
        if: env.VPN_ENDPOINT_MODE == 'domain'
        run: |
          set -euo pipefail
          egress_ip=$(tofu -chdir="$TOFU_DIR" output -no-color -raw egress_public_ipv4)
          python scripts/common/validate-dns-record.py --hostname "$VPN_DOMAIN" --ip "$egress_ip"

      - name: Write deploy outputs
        id: deploy_outputs
        if: success()
        run: |
          set -euo pipefail
          egress_ip=$(tofu -chdir="$TOFU_DIR" output -no-color -raw egress_public_ipv4)
          public_ip_endpoint=$(tofu -chdir="$TOFU_DIR" output -no-color -raw wireguard_public_ip_endpoint)
          wireguard_endpoint=$(tofu -chdir="$TOFU_DIR" output -no-color -raw wireguard_endpoint)
          admin_wireguard_endpoint=$(tofu -chdir="$TOFU_DIR" output -no-color -raw admin_wireguard_endpoint)
          domain_endpoint=$(tofu -chdir="$TOFU_DIR" output -no-color -raw wireguard_domain_endpoint 2>/dev/null || true)
          python scripts/common/render-deploy-output.py \
            --egress-public-ip "$egress_ip" \
            --public-ip-endpoint "$public_ip_endpoint" \
            --wireguard-endpoint "$wireguard_endpoint" \
            --admin-wireguard-endpoint "$admin_wireguard_endpoint" \
            --domain-endpoint "$domain_endpoint" \
            --output build/deploy/vpn-deploy-output.json
          cat build/deploy/vpn-deploy-output.json
          echo "egress_public_ipv4=$egress_ip" >> "$GITHUB_OUTPUT"

      - name: Upload deploy output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vpn-deploy-output
          path: build/deploy/vpn-deploy-output.json

      - name: Upload deploy output metadata
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vpn-deploy-output-egress-${{ steps.deploy_outputs.outputs.egress_public_ipv4 }}
          path: build/deploy/vpn-deploy-output.json

      - name: Upload provider console log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vpn-provider-console-log
          path: build/deploy/provider-console.log
          if-no-files-found: ignore

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Infrazero WireGuard VPN egress rebuilt"
            echo ""
            echo "- Cloud provider: \`${VPN_CLOUD_PROVIDER:-hetzner}\`"
            if tofu -chdir="$TOFU_DIR" output -no-color -raw egress_public_ipv4 >/tmp/egress_ip 2>/dev/null; then
              ip=$(cat /tmp/egress_ip)
              echo "- Egress public IPv4: \`$ip\`"
            fi
            if tofu -chdir="$TOFU_DIR" output -no-color -raw wireguard_endpoint >/tmp/wireguard_endpoint 2>/dev/null; then
              endpoint=$(cat /tmp/wireguard_endpoint)
              echo "- WireGuard endpoint: \`$endpoint\`"
            fi
            if tofu -chdir="$TOFU_DIR" output -no-color -raw admin_wireguard_endpoint >/tmp/admin_wireguard_endpoint 2>/dev/null; then
              admin_endpoint=$(cat /tmp/admin_wireguard_endpoint)
              echo "- Admin WireGuard endpoint: \`$admin_endpoint\`"
            fi
            if [ "${VPN_ENDPOINT_MODE:-}" = "domain" ]; then
              echo "- Domain endpoint: \`${VPN_DOMAIN}:${WG_LISTEN_PORT}\`"
            else
              echo "- Public IP mode: use the WireGuard endpoint above, or replace REPLACE_WITH_EGRESS_PUBLIC_IP in the downloaded client configs."
            fi
            echo "- Deploy output artifact: \`vpn-deploy-output\`"
            echo "- Client private keys are not stored in GitHub or Infrazero."
          } >> "$GITHUB_STEP_SUMMARY"
